name: Daily Auto Commits

on:
  schedule:
    - cron: '30 3 * * *'    # slot 0 — 9:00 AM IST
    - cron: '0 5 * * *'     # slot 1 — 10:30 AM IST
    - cron: '30 7 * * *'    # slot 2 — 1:00 PM IST
    - cron: '0 11 * * *'    # slot 3 — 4:30 PM IST
    - cron: '30 14 * * *'   # slot 4 — 8:00 PM IST
    - cron: '0 17 * * *'    # slot 5 — 10:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run commit script
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python generate_commit.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -f .skip_commit ]; then
            rm .skip_commit
            echo "Slot skipped for today."
          elif git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            MSG=$(cat .commit_msg 2>/dev/null || echo "chore: daily update")
            git commit -m "$MSG"
            git push
            echo "Pushed: $MSG"
          fi
